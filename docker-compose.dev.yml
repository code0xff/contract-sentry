x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  api:
    <<: *host-gateway
    volumes:
      - ./backend/app:/app/app
    environment:
      - LOG_LEVEL=DEBUG
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  worker-static:
    <<: *host-gateway
    volumes:
      - ./backend/app:/app/app
  worker-dynamic:
    <<: *host-gateway
    volumes:
      - ./backend/app:/app/app
  worker-simulation:
    <<: *host-gateway
    volumes:
      - ./backend/app:/app/app
  worker-report:
    <<: *host-gateway
    volumes:
      - ./backend/app:/app/app
