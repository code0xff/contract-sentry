services:
  api:
    volumes:
      - ./backend/app:/app/app
    environment:
      - LOG_LEVEL=DEBUG
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  worker-static:
    volumes:
      - ./backend/app:/app/app
  worker-dynamic:
    volumes:
      - ./backend/app:/app/app
  worker-simulation:
    volumes:
      - ./backend/app:/app/app
  worker-report:
    volumes:
      - ./backend/app:/app/app
