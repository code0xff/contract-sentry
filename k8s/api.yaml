apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: contract-centry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: contract-centry-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: contract-centry-config
            - secretRef:
                name: contract-centry-secrets
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: contract-centry
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
