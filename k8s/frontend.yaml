apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: contract-centry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: contract-centry-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: contract-centry
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
