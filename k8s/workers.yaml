apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-static
  namespace: contract-centry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-static
  template:
    metadata:
      labels:
        app: worker-static
    spec:
      containers:
        - name: worker-static
          image: contract-centry-worker:latest
          command:
            - celery
            - -A
            - app.workers.celery_app.celery_app
            - worker
            - --queues=static_analysis
            - --concurrency=2
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: contract-centry-config
            - secretRef:
                name: contract-centry-secrets
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
---
